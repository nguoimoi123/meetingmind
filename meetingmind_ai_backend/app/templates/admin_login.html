<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MeetingMind Admin Login</title>
  <style>
    :root {
      --bg: #eef3fb;
      --card: rgba(255,255,255,.92);
      --text: #132238;
      --muted: #667085;
      --primary: #1463ff;
      --primary-soft: rgba(20,99,255,.12);
      --danger: #d64545;
      --border: rgba(19,34,56,.1);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", Arial, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(20,99,255,.14), transparent 30%),
        radial-gradient(circle at bottom right, rgba(27,172,126,.12), transparent 28%),
        linear-gradient(160deg, #eff4fb 0%, #e8eef8 100%);
      display: grid;
      place-items: center;
      color: var(--text);
      padding: 24px;
    }
    .shell {
      width: min(440px, 100%);
      background: var(--card);
      backdrop-filter: blur(14px);
      border: 1px solid rgba(255,255,255,.6);
      box-shadow: 0 24px 70px rgba(17,24,39,.12);
      border-radius: 28px;
      overflow: hidden;
    }
    .hero {
      padding: 28px 28px 8px;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: var(--primary-soft);
      color: var(--primary);
      font-weight: 700;
      font-size: 13px;
    }
    h1 {
      margin: 16px 0 8px;
      font-size: 30px;
      line-height: 1.1;
    }
    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
    }
    form {
      padding: 24px 28px 30px;
    }
    label {
      display: block;
      margin-bottom: 10px;
      font-weight: 700;
    }
    input {
      width: 100%;
      border: 1px solid var(--border);
      background: #fff;
      border-radius: 16px;
      padding: 14px 16px;
      font-size: 15px;
      outline: none;
    }
    input:focus {
      border-color: rgba(20,99,255,.35);
      box-shadow: 0 0 0 4px rgba(20,99,255,.1);
    }
    .error {
      margin: 14px 0 0;
      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(214,69,69,.1);
      color: var(--danger);
      font-weight: 600;
    }
    button {
      width: 100%;
      margin-top: 18px;
      border: none;
      border-radius: 16px;
      padding: 14px 18px;
      font-size: 15px;
      font-weight: 800;
      color: white;
      background: linear-gradient(135deg, #1463ff, #0d8bff);
      cursor: pointer;
      box-shadow: 0 16px 30px rgba(20,99,255,.24);
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="hero">
      <div class="badge">MeetingMind Admin</div>
      <h1>Secure Upgrade Console</h1>
      <p>Dang nhap bang admin key de quan ly giao dich, duyet nang cap va gui code realtime cho nguoi dung.</p>
    </div>
    <form method="post">
      <label for="admin_key">Admin Key</label>
      <input id="admin_key" name="admin_key" type="password" placeholder="Nhap admin key" autofocus />
      {% if error %}
      <div class="error">{{ error }}</div>
      {% endif %}
      <button type="submit">Dang nhap</button>
    </form>
  </div>
</body>
</html>
